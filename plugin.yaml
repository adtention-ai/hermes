manifest_version: 1
name: adtention
version: "0.1.4"
description: "One quiet sponsor line for Hermes Telegram/Discord wait states that pays you while your agent works."
author: "ADtention"
kind: standalone
install_options:
  - name: referral
    aliases:
      - ref
    env: ADTENTION_REFERRER
    description: "ADtention referral code or referral link to attribute this install."
provides_hooks:
  - pre_gateway_dispatch
  - pre_llm_call
  - pre_tool_call
  - post_tool_call
  - post_llm_call
