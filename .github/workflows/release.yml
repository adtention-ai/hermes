name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: python -m pip install --upgrade pip build pytest ruff

      - name: Resolve release tag
        id: vars
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          source="tag"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
            source="dispatch"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())
          print(project["project"]["version"])
          PY
          )"
            tag="v$version"
            source="main"
          else
            echo "Release workflow only supports tags, workflow_dispatch, and pushes to main." >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v0.1.0; got: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"

      - name: Verify release metadata matches tag
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          expected = os.environ["RELEASE_VERSION"]
          project = tomllib.loads(Path("pyproject.toml").read_text())
          pyproject_version = project["project"]["version"]
          plugin_yaml = Path("plugin.yaml").read_text()
          match = re.search(r'^version:\s*["\']?([^"\'\n]+)["\']?\s*$', plugin_yaml, re.MULTILINE)
          plugin_version = match.group(1) if match else None

          if pyproject_version != expected:
              raise SystemExit(f"pyproject.toml version {pyproject_version!r} != tag {expected!r}")
          if plugin_version != expected:
              raise SystemExit(f"plugin.yaml version {plugin_version!r} != tag {expected!r}")
          PY

      - name: Run tests
        run: python -m pytest tests -q

      - name: Run import/syntax check
        run: python -m compileall adtention_hermes

      - name: Run lint
        run: ruff check .

      - name: Build package
        run: python -m build

      - name: Prepare release notes
        run: python scripts/extract_changelog.py "${{ steps.vars.outputs.version }}" > release-notes.md

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: adtention-hermes-${{ steps.vars.outputs.tag }}-dist
          path: dist/*
          if-no-files-found: error

      - name: Create release tag for main merge
        if: steps.vars.outputs.source == 'main'
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag $RELEASE_TAG already exists. Bump pyproject.toml, plugin.yaml, adtention_hermes/client.py, and CHANGELOG.md before merging to main." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --title "$RELEASE_TAG" --notes-file release-notes.md
          fi
